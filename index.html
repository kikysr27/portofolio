  <!-- Modern typography stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════════════════════════════
       🎨 DESIGN TOKENS — Industrial · Minimal · Modern
       ══════════════════════════════════════════════════════════════════════ */
    :root {
      /* Palette: deep space + electric cyan + sunset purple */
      --bg-abyss:        #05070F;
      --bg-deep:         #0A0E1F;
      --bg-surface:      #0F1424;
      --bg-elevated:     #141A2E;
      --bg-overlay:      rgba(15, 20, 36, 0.6);

      --brand-cyan:      #06B6D4;
      --brand-cyan-soft: #22D3EE;
      --brand-purple:    #8B5CF6;
      --brand-pink:      #EC4899;
      --brand-amber:     #F59E0B;
      --brand-emerald:   #10B981;

      --text-primary:    #F1F5F9;
      --text-secondary:  #CBD5E1;
      --text-muted:      #64748B;

      --border-soft:     rgba(148, 163, 184, 0.12);
      --border-accent:   rgba(6, 182, 212, 0.35);

      /* Gradients */
      --gradient-brand:   linear-gradient(135deg, #06B6D4 0%, #8B5CF6 50%, #EC4899 100%);
      --gradient-text:    linear-gradient(135deg, #22D3EE 0%, #A78BFA 100%);
      --gradient-subtle:  linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(139, 92, 246, 0.1));
      --gradient-card:    linear-gradient(135deg, rgba(15, 20, 36, 0.9), rgba(20, 26, 46, 0.7));
      --gradient-glow:    radial-gradient(circle at 30% 20%, rgba(6, 182, 212, 0.15), transparent 50%),
                          radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.12), transparent 50%);

      /* Elevation & radius */
      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  22px;
      --radius-xl:  32px;

      --shadow-sm:  0 2px 8px rgba(0,0,0,0.25);
      --shadow-md:  0 8px 28px rgba(0,0,0,0.35);
      --shadow-lg:  0 20px 60px rgba(0,0,0,0.45);
      --shadow-glow: 0 0 40px rgba(6, 182, 212, 0.25);

      /* Motion */
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ══════════════════════════════════════════════════════════════════════
       🌐 BASE & RESET
       ══════════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; scroll-padding-top: 90px; }

    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text-secondary);
      background: var(--bg-abyss);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      min-height: 100vh;
    }

    /* Subtle animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        var(--gradient-glow),
        linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px) 0 0 / 40px 40px,
        linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px) 0 0 / 40px 40px,
        var(--bg-abyss);
      z-index: -2;
      pointer-events: none;
    }

    /* Floating orbs background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 85%, rgba(236, 72, 153, 0.08) 0%, transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(6, 182, 212, 0.08) 0%, transparent 35%);
      z-index: -1;
      pointer-events: none;
      animation: orbDrift 45s ease-in-out infinite alternate;
    }

    @keyframes orbDrift {
      /* Drift amplitudo dikurangi, periode lebih panjang — kesan "ambient" */
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(12px, -8px) scale(1.04); }
      100% { transform: translate(-8px, 12px) scale(0.98); }
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    a { color: var(--brand-cyan); text-decoration: none; transition: color 0.25s var(--ease-smooth); }
    a:hover { color: var(--brand-cyan-soft); }

    ul { list-style: none; }

    img { max-width: 100%; display: block; }

    .container {
      width: 100%;
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ══════════════════════════════════════════════════════════════════════
       🧭 NAVIGATION — Sticky glassmorphism nav
       ══════════════════════════════════════════════════════════════════════ */
    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 0;
      background: rgba(5, 7, 15, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-soft);
      transition: all 0.3s var(--ease-smooth);
    }
    .topnav.scrolled { padding: 12px 0; background: rgba(5, 7, 15, 0.9); }
    .topnav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }
    .topnav .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }
    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gradient-brand);
      box-shadow: 0 0 10px var(--brand-cyan);
      /* Pulse halus — 3.5s, scale max 1.08 (dari 1.2), kesan "alive" tanpa ribut */
      animation: brandPulse 3.5s ease-in-out infinite;
    }
    @keyframes brandPulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 10px var(--brand-cyan); }
      50%      { transform: scale(1.08); box-shadow: 0 0 16px var(--brand-purple); }
    }
    /* Alias untuk elemen lama yg masih pakai 'pulse' */
    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.06); opacity: 0.85; }
    }

    .nav-links { display: flex; gap: 6px; align-items: center; }
    .nav-links a {
      position: relative;
      padding: 8px 16px;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
      border-radius: var(--radius-sm);
      transition: all 0.25s var(--ease-smooth);
    }
    .nav-links a::before {
      content: '';
      position: absolute;
      bottom: 4px; left: 50%;
      width: 0; height: 2px;
      background: var(--gradient-brand);
      transform: translateX(-50%);
      transition: width 0.3s var(--ease-smooth);
    }
    .nav-links a:hover { color: var(--text-primary); }
    .nav-links a:hover::before { width: 60%; }
    .nav-links a.active { color: var(--brand-cyan); }
    .nav-links a.active::before { width: 60%; }

    .nav-social { display: flex; gap: 8px; }
    .nav-social a {
      width: 38px; height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid var(--border-soft);
      color: var(--text-secondary);
      font-size: 1rem;
      transition: all 0.25s var(--ease-smooth);
    }
    .nav-social a:hover {
      background: var(--gradient-brand);
      color: #fff;
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .nav-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }

    /* ══════════════════════════════════════════════════════════════════════
       🚀 HERO SECTION
       ══════════════════════════════════════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 140px 0 80px;
      position: relative;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--gradient-subtle);
      border: 1px solid var(--border-accent);
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--brand-cyan-soft);
      letter-spacing: 0.1em;
      margin-bottom: 28px;
      animation: slideInDown 0.8s var(--ease-smooth) both;
    }
    .hero-eyebrow::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--brand-emerald);
      box-shadow: 0 0 12px var(--brand-emerald);
      animation: pulse 2s infinite;
    }
    @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 24px;
      animation: fadeInUp 0.9s var(--ease-smooth) both 0.15s;
    }
    .hero-title .gradient-text {
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      /* Shift lambat: 20s/cycle — subtle warna bergeser, tidak kejar-kejaran */
      animation: gradientShift 20s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .hero-role {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      animation: fadeInUp 0.9s var(--ease-smooth) both 0.25s;
    }
    .hero-role .typing { color: var(--brand-cyan); font-weight: 600; }
    .hero-role .typing::after {
      content: '|';
      color: var(--brand-cyan);
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .hero-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 560px;
      margin-bottom: 36px;
      animation: fadeInUp 0.9s var(--ease-smooth) both 0.35s;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      animation: fadeInUp 0.9s var(--ease-smooth) both 0.45s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.3s var(--ease-smooth);
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: var(--gradient-brand);
      color: #fff;
      box-shadow: 0 10px 30px rgba(6, 182, 212, 0.25);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #22D3EE 0%, #A78BFA 50%, #F472B6 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(139, 92, 246, 0.4); color: #fff; }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary span { position: relative; z-index: 1; }
    .btn-ghost {
      background: rgba(148, 163, 184, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-soft);
    }
    .btn-ghost:hover {
      background: rgba(6, 182, 212, 0.1);
      border-color: var(--brand-cyan);
      color: var(--brand-cyan-soft);
      transform: translateY(-2px);
    }

    .hero-visual {
      position: relative;
      display: flex;
      justify-content: center;
      animation: fadeInRight 1s var(--ease-smooth) both 0.4s;
    }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    .hero-photo {
      width: 340px; height: 340px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      border: 4px solid transparent;
      background-image: linear-gradient(var(--bg-deep), var(--bg-deep)),
                        var(--gradient-brand);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      box-shadow: var(--shadow-lg);
      /* Tenang: foto statis — tidak ada gerakan mengganggu.
         Glow halus di balik foto (::before) cukup memberi kesan hidup. */
    }
    @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .hero-photo-wrap {
      position: relative;
      padding: 30px;
    }
    .hero-photo-wrap::before {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      inset: 0;
      background: var(--gradient-brand);
      filter: blur(70px);
      opacity: 0.22;
      z-index: 0;
      /* Pulse sangat halus — 10 detik/cycle, scale 1 → 1.05 (nyaris tidak terlihat) */
      animation: heroGlow 10s ease-in-out infinite;
    }
    @keyframes heroGlow {
      0%, 100% { opacity: 0.22; transform: scale(1); }
      50%      { opacity: 0.32; transform: scale(1.05); }
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--border-soft);
      animation: fadeInUp 0.9s var(--ease-smooth) both 0.55s;
    }
    .hero-stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
      line-height: 1;
      margin-bottom: 6px;
    }
    .hero-stat-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: floatY 2.5s ease-in-out infinite;
    }
    .scroll-hint::after {
      content: '';
      width: 1px; height: 30px;
      background: linear-gradient(to bottom, var(--brand-cyan), transparent);
    }

    /* ══════════════════════════════════════════════════════════════════════
       📚 SECTIONS
       ══════════════════════════════════════════════════════════════════════ */
    section { padding: 100px 0; position: relative; }

    .section-head { text-align: center; max-width: 720px; margin: 0 auto 60px; }
    .section-label {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--brand-cyan);
      letter-spacing: 0.25em;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .section-label::before { content: '// '; color: var(--brand-purple); }
    .section-title {
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 700;
      margin-bottom: 16px;
    }
    .section-title .accent {
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .section-sub { color: var(--text-secondary); font-size: 1.05rem; }

    /* ══════════════════════════════════════════════════════════════════════
       👤 ABOUT
       ══════════════════════════════════════════════════════════════════════ */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 60px;
      align-items: center;
    }
    .about-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 36px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .about-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--gradient-brand);
      opacity: 0.6;
    }
    .about-card h3 {
      font-size: 1.35rem;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .about-card h3 .accent { color: var(--brand-cyan); }
    .about-text {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .contact-list { display: grid; gap: 14px; }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(148, 163, 184, 0.04);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      transition: all 0.25s var(--ease-smooth);
    }
    .contact-item i {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 10px;
      background: var(--gradient-subtle);
      color: var(--brand-cyan);
      font-size: 1.05rem;
      flex-shrink: 0;
    }
    .contact-item:hover {
      background: rgba(6, 182, 212, 0.08);
      border-color: var(--border-accent);
      transform: translateX(4px);
      color: var(--text-primary);
    }
    .contact-item strong { color: var(--text-primary); font-weight: 600; margin-right: 6px; }

    /* ══════════════════════════════════════════════════════════════════════
       📅 TIMELINE — Education & Experience
       ══════════════════════════════════════════════════════════════════════ */
    .timeline { position: relative; padding-left: 30px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 8px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--brand-cyan), var(--brand-purple), transparent);
    }
    .t-item {
      position: relative;
      padding-bottom: 40px;
    }
    .t-item:last-child { padding-bottom: 0; }
    .t-item::before {
      content: '';
      position: absolute;
      left: -30px; top: 32px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--bg-abyss);
      border: 3px solid var(--brand-cyan);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
      z-index: 1;
    }
    .t-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 28px;
      transition: all 0.3s var(--ease-smooth);
      backdrop-filter: blur(10px);
    }
    .t-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .t-head {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .t-logo {
      width: 64px; height: 64px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.95);
      padding: 6px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .t-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .t-title { flex: 1; min-width: 200px; }
    .t-title h4 { font-size: 1.2rem; margin-bottom: 6px; }
    .t-title h4 a { color: var(--text-primary); }
    .t-title h4 a:hover { color: var(--brand-cyan-soft); }
    .t-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .t-meta span { display: inline-flex; align-items: center; gap: 6px; }
    .t-meta i { color: var(--brand-cyan); }

    .t-desc { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 16px; }
    .t-section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--brand-cyan);
      margin: 18px 0 10px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .t-list { list-style: none; padding: 0; }
    .t-list li {
      position: relative;
      padding-left: 22px;
      margin-bottom: 10px;
      font-size: 0.93rem;
      color: var(--text-secondary);
    }
    .t-list li::before {
      content: '▹';
      position: absolute;
      left: 0;
      color: var(--brand-cyan);
    }

    /* ══════════════════════════════════════════════════════════════════════
       📦 PROJECTS GRID
       ══════════════════════════════════════════════════════════════════════ */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    .project-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      transition: all 0.4s var(--ease-smooth);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
    }
    .project-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: var(--gradient-brand);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
              mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s var(--ease-smooth);
      pointer-events: none;
    }
    .project-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); }
    .project-card:hover::after { opacity: 1; }
    .project-media {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
    }
    .project-media img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--ease-smooth);
    }
    .project-card:hover .project-media img { transform: scale(1.08); }
    .project-media::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(5, 7, 15, 0.9) 0%, transparent 60%);
    }
    .project-body { padding: 22px 24px 24px; flex: 1; display: flex; flex-direction: column; }
    .project-title {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    .project-title a { color: var(--text-primary); }
    .project-title a:hover { color: var(--brand-cyan-soft); }
    .project-desc { color: var(--text-muted); font-size: 0.92rem; flex: 1; }
    .project-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--brand-cyan);
    }
    .project-link-btn i { transition: transform 0.25s var(--ease-smooth); }
    .project-card:hover .project-link-btn i { transform: translateX(4px); }

    /* ══════════════════════════════════════════════════════════════════════
       🧠 SKILLS
       ══════════════════════════════════════════════════════════════════════ */
    .skills-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }
    .skill-group {
      background: var(--gradient-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 28px;
      backdrop-filter: blur(10px);
      transition: all 0.3s var(--ease-smooth);
    }
    .skill-group:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .skill-group h3 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .skill-group h3 i {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border-radius: 10px;
      background: var(--gradient-subtle);
      color: var(--brand-cyan);
      font-size: 1rem;
    }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(148, 163, 184, 0.05);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.25s var(--ease-smooth);
      cursor: default;
    }
    .chip i { color: var(--brand-cyan); font-size: 0.9rem; }
    .chip:hover {
      background: var(--gradient-subtle);
      border-color: var(--border-accent);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.2);
    }

    /* ══════════════════════════════════════════════════════════════════════
       💼 WORK — same timeline but with skill-chips
       ══════════════════════════════════════════════════════════════════════ */
    .t-skill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .t-skill-chip {
      padding: 6px 12px;
      background: rgba(6, 182, 212, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--brand-cyan-soft);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* ══════════════════════════════════════════════════════════════════════
       ✉️ CONTACT
       ══════════════════════════════════════════════════════════════════════ */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 40px;
    }
    .contact-panel {
      background: var(--gradient-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 36px;
      backdrop-filter: blur(10px);
    }
    .contact-panel h3 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }
    .contact-panel p { color: var(--text-secondary); margin-bottom: 24px; }

    .contact-channels { display: grid; gap: 14px; margin-bottom: 24px; }
    .contact-channel {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: rgba(148, 163, 184, 0.04);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      transition: all 0.25s var(--ease-smooth);
    }
    .contact-channel:hover {
      background: rgba(6, 182, 212, 0.08);
      border-color: var(--border-accent);
      transform: translateX(4px);
    }
    .contact-channel i {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 10px;
      background: var(--gradient-subtle);
      color: var(--brand-cyan);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-input, .form-textarea {
      width: 100%;
      padding: 14px 18px;
      background: rgba(148, 163, 184, 0.05);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.25s var(--ease-smooth);
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--brand-cyan);
      background: rgba(6, 182, 212, 0.04);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
    }
    .form-textarea { resize: vertical; min-height: 140px; margin-bottom: 18px; }

    /* ══════════════════════════════════════════════════════════════════════
       🦶 FOOTER
       ══════════════════════════════════════════════════════════════════════ */
    .footer {
      padding: 40px 0;
      border-top: 1px solid var(--border-soft);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
    }
    .footer .footer-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .footer .accent { color: var(--brand-cyan); }

    /* ══════════════════════════════════════════════════════════════════════
       📱 RESPONSIVE
       ══════════════════════════════════════════════════════════════════════ */
    /* Layout utama grid → single column di tablet/mobile.
       Breakpoint detail lainnya didefinisikan di blok mobile komprehensif
       di bawah (bagian "MOBILE RESPONSIVENESS"). */
    @media (max-width: 980px) {
      .hero-grid, .about-grid, .contact-grid { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════════════════════════════════════════════
       🎬 WORK ILLUSTRATION — Animated SVG per job role
       ══════════════════════════════════════════════════════════════════════ */
    .work-illustration {
      position: relative;
      border-radius: var(--radius-md);
      background:
        radial-gradient(circle at 30% 40%, rgba(6,182,212,0.15), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(139,92,246,0.12), transparent 55%),
        linear-gradient(135deg, #0A0E1F 0%, #141A2E 100%);
      border: 1px solid var(--border-soft);
      padding: 20px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .work-illustration::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(148,163,184,0.04) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px) 0 0 / 20px 20px;
      pointer-events: none;
    }
    .work-illustration svg {
      width: 100%;
      max-height: 200px;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* ─── AGV (ORBIT): track, moving vehicle, LiDAR sweep, obstacle ─── */
    .svg-agv-body { animation: agvMove 7s ease-in-out infinite; transform-origin: center; }
    @keyframes agvMove {
      0%   { transform: translateX(-70px); }
      50%  { transform: translateX(70px); }
      100% { transform: translateX(-70px); }
    }
    .svg-lidar-beam {
      transform-origin: 160px 92px;
      animation: lidarSweep 2.2s ease-in-out infinite;
      transform-box: fill-box;
    }
    @keyframes lidarSweep {
      0%   { transform: rotate(-55deg); opacity: 0.9; }
      50%  { transform: rotate(55deg);  opacity: 0.4; }
      100% { transform: rotate(-55deg); opacity: 0.9; }
    }
    .svg-track-dash { animation: trackFlow 1s linear infinite; }
    @keyframes trackFlow { to { stroke-dashoffset: -12; } }
    .svg-obstacle  { animation: obstaclePulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes obstaclePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.55; }
    }
    .svg-blink-1 { animation: blinkFast 0.9s ease-in-out infinite; }
    .svg-blink-2 { animation: blinkFast 0.9s ease-in-out infinite 0.3s; }
    @keyframes blinkFast { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ─── AI × PLC (TMMIN Full-time): conveyor, camera vision, detection, PLC ─── */
    .svg-belt-item { animation: beltMove 6s linear infinite; }
    @keyframes beltMove {
      0%   { transform: translateX(-40px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateX(340px); opacity: 0; }
    }
    .svg-roller { animation: rollerSpin 1.5s linear infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes rollerSpin { to { transform: rotate(360deg); } }
    .svg-detect-box { animation: beltMove 6s linear infinite; }
    .svg-detect-box rect { animation: detectPulse 0.8s ease-in-out infinite; }
    @keyframes detectPulse {
      0%, 100% { stroke-opacity: 1; }
      50%      { stroke-opacity: 0.3; }
    }
    .svg-camera-lens { animation: lensGlow 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes lensGlow {
      0%, 100% { transform: scale(1); fill: #22D3EE; }
      50%      { transform: scale(1.3); fill: #F59E0B; }
    }
    .svg-plc-led-1 { animation: ledBlink 1.2s ease-in-out infinite; }
    .svg-plc-led-2 { animation: ledBlink 1.2s ease-in-out infinite 0.3s; }
    .svg-plc-led-3 { animation: ledBlink 1.2s ease-in-out infinite 0.6s; }
    @keyframes ledBlink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .svg-data-flow {
      stroke-dasharray: 3 3;
      animation: dataFlow 1s linear infinite;
    }
    @keyframes dataFlow { to { stroke-dashoffset: -12; } }
    .svg-notif-ping {
      transform-origin: center;
      transform-box: fill-box;
      animation: notifPing 2s ease-in-out infinite;
    }
    @keyframes notifPing {
      0%, 100% { transform: scale(1); opacity: 0; }
      10%      { transform: scale(1); opacity: 1; }
      60%      { transform: scale(2.2); opacity: 0; }
    }

    /* ─── Teaching / Internship: neural net, audience, data flow ─── */
    .svg-neural-node { animation: neuralPulse 2.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .svg-neural-node:nth-child(odd) { animation-delay: 0.6s; }
    @keyframes neuralPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px currentColor); }
      50%      { transform: scale(1.4); filter: drop-shadow(0 0 8px currentColor); }
    }
    .svg-neural-conn {
      stroke-dasharray: 4 4;
      animation: neuralFlow 2s linear infinite;
    }
    @keyframes neuralFlow { to { stroke-dashoffset: -16; } }
    .svg-audience-head {
      animation: headBob 3s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .svg-audience-head:nth-child(2) { animation-delay: 0.2s; }
    .svg-audience-head:nth-child(3) { animation-delay: 0.4s; }
    .svg-audience-head:nth-child(4) { animation-delay: 0.6s; }
    .svg-audience-head:nth-child(5) { animation-delay: 0.8s; }
    .svg-audience-head:nth-child(6) { animation-delay: 1.0s; }
    .svg-audience-head:nth-child(7) { animation-delay: 1.2s; }
    @keyframes headBob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .svg-chalk-line {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: chalkWrite 3s ease-in-out infinite;
    }
    @keyframes chalkWrite {
      0%       { stroke-dashoffset: 60; }
      50%, 70% { stroke-dashoffset: 0; }
      100%     { stroke-dashoffset: -60; }
    }

    /* ══════════════════════════════════════════════════════════════════════
       🌊 SCROLL-DRIVEN ANIMATIONS — Parallax + continuous motion
       ══════════════════════════════════════════════════════════════════════ */
    /* Parallax helpers — updated by JS via CSS var --scroll */
    .parallax-slow  { transform: translate3d(0, calc(var(--scroll, 0) * -0.15px), 0); }
    .parallax-fast  { transform: translate3d(0, calc(var(--scroll, 0) * -0.35px), 0); }
    .parallax-tilt  { transform: translate3d(0, calc(var(--scroll, 0) * -0.08px), 0) rotate(calc(var(--scroll, 0) * 0.02deg)); }

    /* Section labels slide-reveal as they enter */
    .section-label { position: relative; overflow: hidden; }
    .section-label::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(6,182,212,0.4), transparent);
      transform: translateX(-100%);
    }
    .section-head.aos-animate .section-label::after {
      animation: labelShimmer 1.5s 0.3s var(--ease-smooth) forwards;
    }
    @keyframes labelShimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* Alternating timeline slide — odd from left, even from right */
    .timeline .t-item:nth-child(odd)  [data-aos] { transition-delay: 0s; }
    .timeline .t-item:nth-child(even) [data-aos] { transition-delay: 0.08s; }

    /* Floating decoration elements */
    .floaty {
      position: absolute;
      pointer-events: none;
      opacity: 0.06;
      z-index: 0;
      /* Gerakan sangat pelan (32s), amplitudo tiny — nyaris imperceptible */
      animation: floatAround 32s ease-in-out infinite;
    }
    .floaty-1 { top: 10%; left: 5%; font-size: 54px; color: var(--brand-cyan); animation-delay: 0s; }
    .floaty-2 { top: 40%; right: 8%; font-size: 44px; color: var(--brand-purple); animation-delay: 10s; }
    .floaty-3 { bottom: 15%; left: 10%; font-size: 50px; color: var(--brand-pink); animation-delay: 20s; }
    @keyframes floatAround {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50%      { transform: translate(8px, -10px) rotate(2deg); }
    }
    section { position: relative; overflow: hidden; }

    /* Timeline line fills as it enters view */
    .timeline::before {
      background: linear-gradient(to bottom,
        var(--brand-cyan) 0%,
        var(--brand-cyan) var(--fill, 0%),
        rgba(148,163,184,0.1) var(--fill, 0%),
        rgba(148,163,184,0.1) 100%);
      transition: background 0.3s var(--ease-smooth);
    }

    /* Nav links & chips — sengaja DIAM. Hover effect sudah cukup untuk hint.
       Animasi kontinyu di nav & chip terasa ribut di layar besar. */

    /* Reduced motion — respect OS setting */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .floaty, .hero-photo-wrap::before, body::after { animation: none !important; }
    }

    /* Touch devices (HP/tablet) — floaty jangan animasi sama sekali agar
       GPU budget HP dipakai untuk scroll smooth, bukan animasi dekoratif.
       Hanya device dengan mouse presisi (desktop) yang dapat efek extra. */
    @media (pointer: coarse) {
      .floaty { animation: none; opacity: 0.04; }
      .hero-photo-wrap::before { animation-duration: 15s; }
    }

    /* ══════════════════════════════════════════════════════════════════════
       🌗 LIGHT THEME — Triggered via body[data-theme="light"]
       Default dark, toggle via button, preference di localStorage.
       ══════════════════════════════════════════════════════════════════════ */
    body[data-theme="light"] {
      --bg-abyss:        #F8FAFC;
      --bg-deep:         #FFFFFF;
      --bg-surface:      #F1F5F9;
      --bg-elevated:     #FFFFFF;
      --bg-overlay:      rgba(255, 255, 255, 0.75);

      --brand-cyan:      #0891B2;
      --brand-cyan-soft: #06B6D4;
      --brand-purple:    #7C3AED;
      --brand-pink:      #DB2777;
      --brand-amber:     #D97706;
      --brand-emerald:   #059669;

      --text-primary:    #0F172A;
      --text-secondary:  #334155;
      --text-muted:      #64748B;

      --border-soft:     rgba(15, 23, 42, 0.1);
      --border-accent:   rgba(8, 145, 178, 0.4);

      --gradient-subtle: linear-gradient(135deg, rgba(8, 145, 178, 0.1), rgba(124, 58, 237, 0.1));
      --gradient-card:   linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.8));
      --gradient-glow:   radial-gradient(circle at 30% 20%, rgba(8, 145, 178, 0.08), transparent 50%),
                         radial-gradient(circle at 70% 80%, rgba(124, 58, 237, 0.07), transparent 50%);

      --shadow-sm:       0 2px 8px rgba(15, 23, 42, 0.06);
      --shadow-md:       0 8px 28px rgba(15, 23, 42, 0.08);
      --shadow-lg:       0 20px 60px rgba(15, 23, 42, 0.12);
      --shadow-glow:     0 0 40px rgba(8, 145, 178, 0.2);
    }

    /* Grid overlay lebih kontras di light theme */
    body[data-theme="light"]::before {
      background:
        var(--gradient-glow),
        linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px) 0 0 / 40px 40px,
        linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px) 0 0 / 40px 40px,
        var(--bg-abyss);
    }
    body[data-theme="light"]::after {
      background:
        radial-gradient(circle at 15% 85%, rgba(219, 39, 119, 0.06) 0%, transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(8, 145, 178, 0.06) 0%, transparent 35%);
    }

    /* Nav bar light — adjust transparent bg */
    body[data-theme="light"] .topnav          { background: rgba(248, 250, 252, 0.8); }
    body[data-theme="light"] .topnav.scrolled { background: rgba(255, 255, 255, 0.95); }

    /* Card backgrounds + form inputs get a subtle surface color */
    body[data-theme="light"] .chip,
    body[data-theme="light"] .contact-item,
    body[data-theme="light"] .contact-channel,
    body[data-theme="light"] .form-input,
    body[data-theme="light"] .form-textarea {
      background: rgba(15, 23, 42, 0.03);
    }
    body[data-theme="light"] .chip:hover {
      background: var(--gradient-subtle);
    }

    /* Nav social pills */
    body[data-theme="light"] .nav-social a {
      background: rgba(15, 23, 42, 0.04);
    }

    /* Hero photo border gradient against light bg */
    body[data-theme="light"] .hero-photo {
      background-image: linear-gradient(#FFFFFF, #FFFFFF), var(--gradient-brand);
    }

    /* Work illustration — lighter bg so SVG contrast tetap bagus */
    body[data-theme="light"] .work-illustration {
      background:
        radial-gradient(circle at 30% 40%, rgba(8, 145, 178, 0.12), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(124, 58, 237, 0.1), transparent 55%),
        linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
    }
    body[data-theme="light"] .work-illustration::before {
      background:
        linear-gradient(rgba(15, 23, 42, 0.05) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(90deg, rgba(15, 23, 42, 0.05) 1px, transparent 1px) 0 0 / 20px 20px;
    }

    /* Timeline dot center harus kelihatan di light bg */
    body[data-theme="light"] .t-item::before {
      background: var(--bg-deep);
    }

    /* Floaty decorations lebih gelap di light theme agar tetap kelihatan */
    body[data-theme="light"] .floaty { opacity: 0.06; }

    /* Smooth transition saat switch theme */
    body,
    .topnav, .t-card, .about-card, .project-card, .skill-group,
    .contact-panel, .chip, .contact-item, .contact-channel,
    .form-input, .form-textarea, .work-illustration, .nav-social a {
      transition:
        background-color 0.35s var(--ease-smooth),
        background 0.35s var(--ease-smooth),
        border-color 0.35s var(--ease-smooth),
        color 0.35s var(--ease-smooth),
        box-shadow 0.35s var(--ease-smooth);
    }

    /* ══════════════════════════════════════════════════════════════════════
       🌓 THEME TOGGLE BUTTON
       ══════════════════════════════════════════════════════════════════════ */
    .theme-toggle {
      position: relative;
      width: 48px; height: 38px;
      border: 1px solid var(--border-soft);
      background: rgba(148, 163, 184, 0.08);
      border-radius: 100px;
      cursor: pointer;
      display: grid;
      place-items: center;
      overflow: hidden;
      flex-shrink: 0;
      transition: all 0.3s var(--ease-smooth);
    }
    .theme-toggle:hover {
      background: var(--gradient-subtle);
      border-color: var(--border-accent);
      transform: translateY(-2px);
    }
    .theme-toggle i {
      position: absolute;
      font-size: 1.05rem;
      color: var(--text-secondary);
      transition: all 0.4s var(--ease-bounce);
    }
    .theme-toggle .bx-sun  { transform: translateY(30px) rotate(90deg); opacity: 0; }
    .theme-toggle .bx-moon { transform: translateY(0) rotate(0deg); opacity: 1; }
    body[data-theme="light"] .theme-toggle .bx-sun  { transform: translateY(0) rotate(0deg); opacity: 1; color: var(--brand-amber); }
    body[data-theme="light"] .theme-toggle .bx-moon { transform: translateY(-30px) rotate(-90deg); opacity: 0; }
    body[data-theme="light"] .theme-toggle { background: rgba(15, 23, 42, 0.04); }

    /* ══════════════════════════════════════════════════════════════════════
       📱 MOBILE RESPONSIVENESS — Audit fixes untuk HP Android/iPhone
       ══════════════════════════════════════════════════════════════════════ */

    /* Tablet / small laptop */
    @media (max-width: 1024px) {
      .nav-social { display: none; }
      .container { max-width: 100%; }
    }

    /* Phone landscape & tablet portrait */
    @media (max-width: 820px) {
      .container { padding: 0 20px; }
      section { padding: 70px 0; }

      /* Hero */
      .hero { padding: 110px 0 50px; min-height: auto; }
      .hero-grid { gap: 40px; }
      .hero-visual { order: -1; }
      .hero-photo { width: 240px; height: 240px; }
      .hero-photo-wrap { padding: 22px; }
      .hero-title { font-size: clamp(2rem, 7vw, 3rem); }
      .hero-role { font-size: 0.95rem; }
      .hero-desc { font-size: 0.95rem; }
      .hero-stats { gap: 14px; margin-top: 40px; padding-top: 24px; }
      .hero-stat-num { font-size: 1.6rem; }
      .hero-stat-label { font-size: 0.78rem; }

      /* Section headers lebih rapat */
      .section-head { margin-bottom: 44px; }
      .section-title { font-size: clamp(1.75rem, 5vw, 2.2rem); }
      .section-sub { font-size: 0.95rem; }

      /* About & contact grid */
      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 24px; }
      .about-card, .contact-panel { padding: 28px; }
      .about-card h3, .contact-panel h3 { font-size: 1.2rem; }

      /* Timeline padding lebih ramping */
      .timeline { padding-left: 26px; }
      .t-item::before { left: -26px; top: 28px; width: 16px; height: 16px; }
      .t-card { padding: 22px; }
      .t-head { gap: 14px; }
      .t-logo { width: 54px; height: 54px; }
      .t-title h4 { font-size: 1.1rem; }
      .t-meta { font-size: 0.78rem; gap: 12px; }

      /* Projects: 2 kolom di tablet, 1 di phone */
      .projects-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }

      /* Skills: single column */
      .skills-wrap { grid-template-columns: 1fr; gap: 18px; }
      .skill-group { padding: 24px; }
      .skill-group:nth-child(3) { grid-column: span 1; }
      .skill-group h3 { font-size: 1rem; }
      .chip { padding: 8px 12px; font-size: 0.8rem; }

      /* Work illustration lebih pendek di tablet */
      .work-illustration { padding: 14px; margin-bottom: 20px; }
      .work-illustration svg { max-height: 170px; }

      /* Form: input full-width, tap target besar */
      .form-row { grid-template-columns: 1fr; gap: 12px; }
      .form-input, .form-textarea { padding: 14px 16px; font-size: 16px; /* hindari iOS zoom on focus */ }

      /* Footer */
      .footer { padding: 36px 0; }

      /* Floaty ikon — lebih kecil & lebih samar di mobile */
      .floaty { font-size: 40px !important; opacity: 0.05 !important; }
    }

    /* Phone portrait — cleanup detail kecil */
    @media (max-width: 520px) {
      .container { padding: 0 16px; }
      section { padding: 56px 0; }

      /* Nav: brand lebih kecil, cuma dot + first name */
      .topnav .brand { font-size: 0.95rem; }
      .topnav .brand .brand-full { display: none; }
      .topnav .brand .brand-short { display: inline; }
      .brand-dot { width: 9px; height: 9px; }
      .topnav-inner { gap: 10px; }

      /* Hero tap-targets */
      .hero { padding: 100px 0 40px; }
      .hero-photo { width: 200px; height: 200px; }
      .hero-photo-wrap { padding: 18px; }
      .hero-eyebrow { font-size: 0.7rem; padding: 7px 14px; }
      .hero-title { font-size: clamp(1.75rem, 9vw, 2.6rem); }
      .hero-stats { grid-template-columns: 1fr; gap: 10px; }
      .hero-stat { display: flex; align-items: baseline; gap: 8px; }
      .hero-stat-num { font-size: 1.4rem; display: inline-block; margin-bottom: 0; }
      .hero-stat-label { font-size: 0.85rem; }

      /* CTA buttons full-width stack */
      .hero-cta { flex-direction: column; align-items: stretch; gap: 12px; }
      .btn { width: 100%; justify-content: center; padding: 14px 20px; min-height: 48px; }

      /* Section label */
      .section-label { font-size: 0.72rem; letter-spacing: 0.2em; }
      .section-title { font-size: clamp(1.5rem, 7vw, 1.9rem); }

      /* Project cards: padding lebih compact */
      .project-body { padding: 18px 20px 20px; }
